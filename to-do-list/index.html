<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>To Do List | Organize suas tarefas</title>
  </head>
  <body>
    <main>
      <article class="app">
        <header class="header">
          <div class="header-text">
            <h1>TO-DO LIST</h1>
            <p>Crie, edite e exclua suas tarefas.</p>
          </div>

          <div
            class="btn-theme"
            type="button"
            aria-label="Alterar tema escuro/claro"
            title="Clique aqui para mudar o tema"
          >
            <button id="btn-theme">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-moon-fill"
                viewBox="0 0 16 16"
              >
                <path
                  d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278"
                />
              </svg>
            </button>
          </div>
        </header>

        <form class="conteinerTask">
          <label for="task"></label>
          <input
            type="text"
            name="text"
            id="task"
            placeholder="Digite uma nova tarefa..."
          />
          <button
            id="addTask"
            title="Adicionar uma tarefa na lista"
            aria-label="Adicionar tarefa"
            onclick="newTask(event)"
            type="submit"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="25"
              height="25"
              fill="currentColor"
              class="bi bi-plus"
              viewBox="0 0 16 16"
            >
              <path
                d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"
              />
            </svg>
          </button>
        </form>
        <section class="container-body">
          <ul class="tasks">
            <li></li>
          </ul>
        </section>
      </article>
    </main>

    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Editar Tarefa</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="editTaskInput"
              class="form-control"
              placeholder="Edite sua tarefa..."
            />
            <input type="hidden" id="editTaskIndex" />
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button type="button" class="btn btn-primary" onclick="saveEdit()">
              Salvar Alterações
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</html>
